<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ibn Khaldun Institute</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, sans-serif; margin:0; background:#f9fafb; color:#111827; }
  header { background:#1f2937; color:#fff; padding:18px 24px; }
  main { max-width:1100px; margin:auto; padding:24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
  .card { background:#fff; border-radius:8px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  h1 { font-size:22px; } h2 { font-size:18px; margin-bottom:8px; }
  a.admin { color:#fde68a; text-decoration:none; font-size:14px; }
</style>
</head>
<body>
<header>
  <div style="display:flex;justify-content:space-between;align-items:center;max-width:1100px;margin:auto">
    <h1>📚 Ibn Khaldun Institute</h1>
    <a class="admin" href="/admin">অ্যাডমিন প্যানেল →</a>
  </div>
</header>
<main>
  <section class="card" style="margin-bottom:16px">
    <h2>স্বাগতম</h2>
    <p>আমাদের ওয়েবসাইটে আপনাকে স্বাগতম। কোর্স, শিক্ষক ও নোটিশ নিচে দেখুন।</p>
  </section>
  <section><h2>কোর্সসমূহ</h2><div id="courses" class="grid"></div></section>
  <section style="margin-top:24px"><h2>শিক্ষকবৃন্দ</h2><div id="instructors" class="grid"></div></section>
  <section style="margin-top:24px"><h2>নোটিশ</h2><div id="notices" class="grid"></div></section>
</main>
<script>
const API = window.location.origin;
async function load(path, target, render){
  try {
    const r = await fetch(API+path); const d = await r.json();
    const arr = Array.isArray(d) ? d : (d.data||[]);
    document.getElementById(target).innerHTML = arr.map(render).join('') || '<p>কোন ডেটা নেই</p>';
  } catch(e){ document.getElementById(target).innerHTML = '<p>লোড করা যায়নি</p>'; }
}
load('/api/courses','courses', c=>`<div class="card"><h3>${c.title||c.name||''}</h3><p>${c.description||''}</p></div>`);
load('/api/instructors','instructors', i=>`<div class="card"><h3>${i.name||''}</h3><p>${i.bio||i.designation||''}</p></div>`);
load('/api/notices','notices', n=>`<div class="card"><h3>${n.title||''}</h3><p>${n.content||n.body||''}</p></div>`);
</script>
</body>
</html>
