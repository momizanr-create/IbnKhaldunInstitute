<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel - Ibn Khaldun</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f6f9; color: #222; }
  header { background: #1f2937; color: #fff; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 18px; }
  header button { background: #ef4444; color: #fff; border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; }
  .layout { display: flex; min-height: calc(100vh - 56px); }
  nav { width: 220px; background: #111827; color: #d1d5db; padding: 16px 0; }
  nav button { display: block; width: 100%; text-align: left; background: none; border: 0; color: inherit; padding: 10px 18px; cursor: pointer; font-size: 14px; }
  nav button:hover, nav button.active { background: #2563eb; color: #fff; }
  main { flex: 1; padding: 24px; overflow: auto; }
  .card { background: #fff; padding: 18px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px; }
  .card h2 { margin-bottom: 12px; font-size: 16px; color: #111827; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
  th { background: #f9fafb; }
  .btn { background: #2563eb; color: #fff; border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-right: 6px; }
  .btn.green { background: #16a34a; }
  .btn.red { background: #dc2626; }
  .login-wrap { max-width: 360px; margin: 80px auto; }
  .login-wrap input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
  #toast { position: fixed; bottom: 20px; right: 20px; background: #111827; color: #fff; padding: 10px 16px; border-radius: 6px; display: none; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 12px; }
  .stat { background: #fff; padding: 16px; border-radius: 8px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .stat .num { font-size: 24px; font-weight: 700; color: #2563eb; }
  .stat .lbl { font-size: 12px; color: #6b7280; margin-top: 4px; }
  pre { background: #f3f4f6; padding: 10px; border-radius: 6px; max-height: 300px; overflow: auto; font-size: 12px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="login-wrap card">
  <h2>অ্যাডমিন লগইন</h2>
  <input id="loginUser" placeholder="ইউজারনেম" value="admin" />
  <input id="loginPass" type="password" placeholder="পাসওয়ার্ড" />
  <button class="btn" style="width:100%" onclick="doLogin()">লগইন</button>
</div>

<!-- APP -->
<div id="appView" style="display:none">
  <header>
    <h1>📚 Ibn Khaldun — Admin Panel</h1>
    <div>
      <button onclick="logout()">লগআউট</button>
    </div>
  </header>
  <div class="layout">
    <nav id="nav"></nav>
    <main id="main"></main>
  </div>
</div>

<div id="toast"></div>

<script>
const API = window.location.origin;
let TOKEN = localStorage.getItem('admin_token') || '';

const SECTIONS = [
  { id: 'dashboard', label: '🏠 ড্যাশবোর্ড' },
  { id: 'courses', label: '📘 কোর্স' },
  { id: 'instructors', label: '👨\u200d🏫 শিক্ষক' },
  { id: 'enrollments', label: '📝 ভর্তি' },
  { id: 'testimonials', label: '⭐ মতামত' },
  { id: 'notices', label: '📢 নোটিশ' },
  { id: 'blog', label: '✍️ ব্লগ' },
  { id: 'contact', label: '✉️ যোগাযোগ মেসেজ' },
  { id: 'settings', label: '⚙️ সেটিংস' },
  { id: 'downloads', label: '⬇️ ফাইল ডাউনলোড' },
];

function toast(msg, ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background = ok?'#16a34a':'#dc2626';
  t.style.display='block'; setTimeout(()=>t.style.display='none',2500);
}

async function api(path, opts={}){
  const headers = opts.headers || {};
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  if (opts.body && !(opts.body instanceof FormData)) headers['Content-Type']='application/json';
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
  const ct = res.headers.get('content-type')||'';
  if (ct.includes('application/json')) return res.json();
  return res;
}

async function doLogin(){
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  try {
    const r = await fetch(API+'/api/admin/login',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (!r.ok || !d.token) throw new Error(d.error||'লগইন ব্যর্থ');
    TOKEN = d.token;
    localStorage.setItem('admin_token', TOKEN);
    showApp();
  } catch(e){ toast(e.message, false); }
}

function logout(){ localStorage.removeItem('admin_token'); TOKEN=''; location.reload(); }

function showApp(){
  document.getElementById('loginView').style.display='none';
  document.getElementById('appView').style.display='block';
  const nav = document.getElementById('nav');
  nav.innerHTML = SECTIONS.map(s=>`<button data-id="${s.id}" onclick="loadSection('${s.id}')">${s.label}</button>`).join('');
  loadSection('dashboard');
}

function setActive(id){
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.id===id));
}

async function loadSection(id){
  setActive(id);
  const main = document.getElementById('main');
  main.innerHTML = '<div class="card">লোড হচ্ছে...</div>';
  try {
    if (id==='dashboard') return renderDashboard();
    if (id==='downloads') return renderDownloads();
    const map = {
      courses:'/api/admin/courses', instructors:'/api/admin/instructors',
      enrollments:'/api/admin/enrollments', testimonials:'/api/admin/testimonials',
      notices:'/api/admin/notices', blog:'/api/admin/blog',
      contact:'/api/admin/contact-messages', settings:'/api/admin/site-settings'
    };
    const data = await api(map[id]);
    renderList(id, data);
  } catch(e){ main.innerHTML = `<div class="card" style="color:#dc2626">ত্রুটি: ${e.message}</div>`; }
}

async function renderDashboard(){
  const main = document.getElementById('main');
  let stats = {};
  try { stats = await api('/api/admin/stats'); } catch(e){}
  main.innerHTML = `
    <div class="card"><h2>স্বাগতম 👋</h2><p>সাইটের সম্পূর্ণ পরিসংখ্যান নিচে দেখুন।</p></div>
    <div class="stats">
      ${Object.entries(stats).map(([k,v])=>`<div class="stat"><div class="num">${typeof v==='number'?v:JSON.stringify(v)}</div><div class="lbl">${k}</div></div>`).join('') || '<div class="card">ডেটা পাওয়া যায়নি</div>'}
    </div>`;
}

function renderList(id, data){
  const arr = Array.isArray(data) ? data : (data?.data || []);
  const main = document.getElementById('main');
  if (!arr.length){
    main.innerHTML = `<div class="card"><h2>${id}</h2><p>কোন ডেটা নেই।</p><pre>${JSON.stringify(data,null,2)}</pre></div>`;
    return;
  }
  const cols = Object.keys(arr[0]).slice(0,6);
  main.innerHTML = `<div class="card"><h2>${id} — মোট ${arr.length}</h2>
    <table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${arr.map(r=>`<tr>${cols.map(c=>`<td>${escapeHtml(String(r[c]??''))}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}

function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderDownloads(){
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="card"><h2>⬇️ ফাইল ডাউনলোড</h2>
      <p style="margin-bottom:12px;color:#6b7280">সাইটের সকল ডেটা সহ ফাইল ডাউনলোড করুন।</p>
      <button class="btn green" onclick="downloadFile('/api/admin/download-index','index.html')">📄 index.html (ডেটা সহ)</button>
      <button class="btn" onclick="downloadFile('/api/admin/download-admin','admin.html')">🛠 admin.html</button>
      <button class="btn" onclick="downloadFile('/api/admin/download-snapshot','data-snapshot.json')">📦 data-snapshot.json</button>
    </div>`;
}

async function downloadFile(path, filename){
  try {
    const res = await fetch(API+path, { headers: { 'Authorization':'Bearer '+TOKEN }});
    if (!res.ok) throw new Error('HTTP '+res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url); toast('ডাউনলোড শুরু হয়েছে: '+filename);
  } catch(e){ toast('ডাউনলোড ব্যর্থ: '+e.message, false); }
}

if (TOKEN) showApp();
</script>
</body>
</html>
