<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — ইবনে খালদুন ইনস্টিটিউট</title>
  <meta name="description" content="ইবনে খালদুন ইনস্টিটিউটের সহজ, দ্রুত ও আরামদায়ক Admin Panel" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#11110f;--bg2:#181713;--panel:#1f1d18;--panel2:#28251e;--text:#f8f3df;--muted:#b8ad90;--line:#383326;--gold:#f5c518;--gold2:#ffe07a;--green:#35d07f;--red:#ff5c5c;--blue:#6ab7ff;--orange:#ffb45c;--shadow:0 24px 80px rgba(0,0,0,.42);--radius:18px;--sidebar:292px
    }
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:'Hind Siliguri',system-ui,sans-serif;background:radial-gradient(circle at 16% 0%,rgba(245,197,24,.13),transparent 380px),radial-gradient(circle at 88% 8%,rgba(53,208,127,.09),transparent 420px),linear-gradient(135deg,#11110f,#15140f 45%,#0d0d0b);color:var(--text);min-height:100vh;letter-spacing:0}button,input,textarea,select{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}.hidden{display:none!important}
    .login{min-height:100vh;display:grid;place-items:center;padding:20px}.login-card{width:min(430px,100%);background:rgba(31,29,24,.9);border:1px solid var(--line);border-radius:28px;padding:34px;box-shadow:var(--shadow);backdrop-filter:blur(18px);animation:enter .45s ease both}.logo{width:68px;height:68px;border-radius:20px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#14120c;display:grid;place-items:center;margin:0 auto 18px;font-weight:900;font-size:24px}.login h1{text-align:center;margin:0;font-size:30px}.login p{text-align:center;color:var(--muted);margin:8px 0 26px}.field{display:block;margin:0 0 15px;color:var(--text);font-weight:600}.field input,.field textarea,.field select{width:100%;margin-top:7px;background:#14130f;border:1px solid var(--line);color:var(--text);border-radius:14px;padding:13px 14px;outline:0}.field textarea{min-height:110px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(245,197,24,.14)}.btn{border:0;border-radius:14px;padding:12px 16px;font-weight:800;background:var(--gold);color:#15120a;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.18s transform,.18s opacity}.btn:hover{transform:translateY(-1px)}.btn:disabled{opacity:.62;cursor:not-allowed}.btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line)}.btn.danger{background:rgba(255,92,92,.12);color:var(--red);border:1px solid rgba(255,92,92,.34)}.btn.green{background:var(--green);color:#07160d}.btn.small{padding:8px 11px;border-radius:10px;font-size:13px}.app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;background:rgba(20,19,15,.92);border-right:1px solid var(--line);padding:16px;overflow:auto;backdrop-filter:blur(16px)}.brand{display:flex;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);padding:12px;border-radius:18px;margin-bottom:14px}.brand .mark{width:46px;height:46px;border-radius:14px;background:var(--gold);color:#15120a;display:grid;place-items:center;font-weight:900}.brand b{display:block;font-size:17px}.brand span{color:var(--muted);font-size:12px}.nav-section{margin:18px 10px 8px;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase}.nav button{width:100%;border:0;background:transparent;color:var(--text);display:flex;align-items:center;gap:10px;text-align:left;border-radius:14px;padding:11px 12px;margin:3px 0;transition:.16s}.nav button:hover,.nav button.active{background:var(--gold);color:#15120a}.nav small{margin-left:auto;opacity:.72}.content{min-width:0;padding:22px}.topbar{position:sticky;top:14px;z-index:10;display:flex;align-items:center;gap:12px;background:rgba(31,29,24,.82);border:1px solid var(--line);border-radius:22px;padding:13px 14px;box-shadow:0 14px 45px rgba(0,0,0,.18);backdrop-filter:blur(16px);margin-bottom:18px}.menu-btn{display:none}.title{min-width:0;flex:1}.title small{color:var(--muted)}.title h2{margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.grid{display:grid;gap:16px}.stats{grid-template-columns:repeat(4,minmax(0,1fr))}.stat,.panel{background:rgba(31,29,24,.88);border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 55px rgba(0,0,0,.2)}.stat{padding:20px}.stat .icon{font-size:25px}.stat p{margin:12px 0 4px;color:var(--muted)}.stat h3{margin:0;font-size:30px}.panel{padding:18px}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:15px}.panel h3{margin:0;font-size:20px}.two{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.row{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:rgba(40,37,30,.46);border-radius:16px;padding:12px;margin-bottom:10px}.row-main{min-width:0;flex:1}.row b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row p{margin:3px 0 0;color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.badge{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--muted);font-size:12px}.badge.live,.badge.approved,.badge.active{color:var(--green);border-color:rgba(53,208,127,.35);background:rgba(53,208,127,.08)}.badge.pending{color:var(--orange);border-color:rgba(255,180,92,.35);background:rgba(255,180,92,.08)}.badge.rejected,.badge.draft{color:var(--red);border-color:rgba(255,92,92,.35);background:rgba(255,92,92,.08)}.actions{display:flex;gap:7px;flex-wrap:wrap}.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.search{flex:1;min-width:180px;background:#14130f;border:1px solid var(--line);border-radius:14px;color:var(--text);padding:11px 13px;outline:0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tabs button{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:999px;padding:8px 12px}.tabs button.active{background:var(--gold);color:#15120a;border-color:var(--gold)}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}.full{grid-column:1/-1}.toast{border-radius:16px;padding:12px 14px;margin-bottom:14px;border:1px solid rgba(53,208,127,.36);background:rgba(53,208,127,.08);color:var(--green)}.toast.error{border-color:rgba(255,92,92,.36);background:rgba(255,92,92,.08);color:var(--red)}.empty{border:1px dashed var(--line);border-radius:18px;color:var(--muted);padding:28px;text-align:center}.jsonbox{font-family:ui-monospace,Menlo,Consolas,monospace;min-height:260px;line-height:1.5}.mobile-backdrop{display:none}.status-dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 5px rgba(53,208,127,.1)}@keyframes enter{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}.view{animation:enter .36s ease both}
    @media(max-width:1100px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.two,.three{grid-template-columns:1fr}.app{grid-template-columns:1fr}.sidebar{position:fixed;z-index:40;left:0;top:0;transform:translateX(-105%);transition:.25s;width:min(310px,86vw)}.sidebar.open{transform:none}.mobile-backdrop.show{display:block;position:fixed;inset:0;z-index:35;background:rgba(0,0,0,.62)}.menu-btn{display:inline-flex}.content{padding:12px}.topbar{top:8px;border-radius:18px}}
    @media(max-width:640px){.stats{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.row{align-items:stretch;flex-direction:column}.actions{width:100%}.actions .btn{flex:1}.topbar{gap:8px}.title h2{font-size:18px}.btn{padding:10px 12px}.login-card{padding:24px}}
  </style>
</head>
<body>
  <section id="login" class="login">
    <form class="login-card" onsubmit="login(event)">
      <div class="logo">IK</div>
      <h1>Admin Panel</h1>
      <p>কোর্স, হোমপেজ, ইউজার ও অর্ডার সহজে ম্যানেজ করুন</p>
      <div id="loginMsg"></div>
      <label class="field">Username<input id="username" value="admin" autocomplete="username" required></label>
      <label class="field">Password<input id="password" type="password" autocomplete="current-password" required></label>
      <button id="loginBtn" class="btn" style="width:100%">লগইন করুন</button>
    </form>
  </section>

  <section id="app" class="app hidden">
    <aside id="sidebar" class="sidebar">
      <div class="brand"><div class="mark">IK</div><div><b>ইবনে খালদুন</b><span>Admin Control Center</span></div></div>
      <nav id="nav" class="nav"></nav>
      <div style="height:18px"></div>
      <button class="btn secondary" style="width:100%" onclick="logout()">Logout</button>
    </aside>
    <button id="backdrop" class="mobile-backdrop" onclick="toggleSidebar(false)"></button>
    <main class="content">
      <header class="topbar">
        <button class="btn secondary small menu-btn" onclick="toggleSidebar(true)">☰</button>
        <span class="status-dot"></span>
        <div class="title"><small>Connected: current server.js backend</small><h2 id="pageTitle">ড্যাশবোর্ড</h2></div>
        <a class="btn secondary small" href="https://ibnkhalduninstitute.online/" target="_blank">Site</a>
        <button class="btn small" onclick="loadAll(true)">Refresh</button>
      </header>
      <div id="message"></div>
      <section id="view" class="view"></section>
    </main>
  </section>

<script>
const API='https://ibnkhalduninstitute.onrender.com';
let token=localStorage.getItem('admin_token')||'';
let state={stats:{},courses:[],enrollments:[],users:[],messages:[],notices:[],features:[],testimonials:[],instructors:[],blog:[],categories:[],courseTabs:[],accessRequests:[],faqs:{},settings:{}};
let current='dashboard';
let editId=null;
const pages=[
  ['main','dashboard','📊','ড্যাশবোর্ড'],['main','homepage','🏠','হোমপেজ'],['main','courses','📚','কোর্স'],['main','enrollments','📋','এনরোলমেন্ট'],['main','users','👥','ইউজার'],['main','access','🔐','Access Requests'],
  ['content','categories','🏷️','ক্যাটাগরি'],['content','tabs','🧩','Course Tabs'],['content','instructors','👨‍🏫','ইন্সট্রাক্টর'],['content','blog','✍️','ব্লগ'],['content','testimonials','💬','রিভিউ'],['content','features','⭐','Features'],['content','faqs','❓','FAQ'],
  ['site','messages','✉️','Contact Messages'],['site','settings','⚙️','Site Settings'],['site','json','🧾','Advanced JSON']
];
const resourceMap={
  categories:{title:'ক্যাটাগরি',path:'/api/admin/categories',fields:['name','slug','icon','order','active']},tabs:{title:'Course Tabs',path:'/api/admin/course-tabs',fields:['label','key','icon','order','active']},instructors:{title:'ইন্সট্রাক্টর',path:'/api/admin/instructors',fields:['name','slug','title','bio','photo','featured','published']},blog:{title:'ব্লগ পোস্ট',path:'/api/admin/blog',fields:['title','slug','category','excerpt','content','author','image','featured','published']},testimonials:{title:'ছাত্র রিভিউ',path:'/api/admin/testimonials',fields:['name','role','text','rating','avatar','published']},features:{title:'Features',path:'/api/admin/features',fields:['icon','title','desc','order','active']}
};
const settingMap={hero:{label:'Hero Section',path:'/api/admin/hero-section'},site:{label:'Site Settings',path:'/api/admin/site-settings'},navigation:{label:'Navigation',path:'/api/admin/navigation'},footer:{label:'Footer',path:'/api/admin/footer'},theme:{label:'Theme Settings',path:'/api/admin/theme-settings'},welcome:{label:'Welcome Popup',path:'/api/admin/welcome-popup'},cta:{label:'CTA Section',path:'/api/admin/cta-section'},featured:{label:'Featured Courses Config',path:'/api/admin/featured-courses-config'},contact:{label:'Contact Page',path:'/api/admin/contact-content'},about:{label:'About Page',path:'/api/admin/about-page'},bundle:{label:'Content Bundle',path:'/api/admin/content-bundle'},analytics:{label:'Analytics Config',path:'/api/admin/analytics-config'}};
function $(id){return document.getElementById(id)}
function headers(json=true){const h={Authorization:'Bearer '+token};if(json)h['Content-Type']='application/json';return h}
async function req(path,opt={}){const res=await fetch(API+path,{...opt,headers:{...(opt.headers||{}),...(opt.noAuth?{}:headers(!(opt.body instanceof FormData)))}});const text=await res.text();let data;try{data=JSON.parse(text)}catch{data=text}if(!res.ok)throw new Error(data.error||data.message||'Request failed');return data}
function msg(text,type='ok'){ $('message').innerHTML=text?`<div class="toast ${type==='error'?'error':''}">${text}</div>`:''; if(text) setTimeout(()=>{$('message').innerHTML=''},4500)}
function esc(v){return String(v??'').replace(/[&<>'"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]))}
function money(v){return '৳'+(Number(v||0).toLocaleString('bn-BD'))}
function slug(v){return String(v||'').trim().toLowerCase().replace(/\s+/g,'-').replace(/[\\/\?#%&=]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'')}
function initNav(){let groups={main:'মূল মেনু',content:'কনটেন্ট',site:'সাইট ও সেটিংস'},html='';Object.keys(groups).forEach(g=>{html+=`<div class="nav-section">${groups[g]}</div>`;pages.filter(p=>p[0]===g).forEach(p=>html+=`<button data-page="${p[1]}" onclick="go('${p[1]}')"><span>${p[2]}</span>${p[3]}<small>›</small></button>`)});$('nav').innerHTML=html}
function setActive(){document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===current));$('pageTitle').textContent=(pages.find(p=>p[1]===current)||[])[3]||'Admin'}
function go(page){current=page;editId=null;setActive();toggleSidebar(false);render()}
function toggleSidebar(open){$('sidebar').classList.toggle('open',open);$('backdrop').classList.toggle('show',open)}
async function login(e){e.preventDefault();$('loginBtn').disabled=true;$('loginMsg').innerHTML='';try{const r=await fetch(API+'/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:$('username').value,password:$('password').value})});const d=await r.json();if(!r.ok)throw new Error(d.error||'লগইন ব্যর্থ');token=d.token;localStorage.setItem('admin_token',token);localStorage.setItem('admin_username',d.username||$('username').value);showApp();await loadAll(true)}catch(err){$('loginMsg').innerHTML=`<div class="toast error">${esc(err.message)}</div>`}finally{$('loginBtn').disabled=false}}
function logout(){localStorage.removeItem('admin_token');token='';$('app').classList.add('hidden');$('login').classList.remove('hidden')}
function showApp(){initNav();$('login').classList.add('hidden');$('app').classList.remove('hidden');setActive()}
async function loadAll(show){if(!token)return;try{if(show)msg('ডেটা লোড হচ্ছে...');const jobs=[['stats','/api/admin/stats'],['courses','/api/admin/courses'],['enrollments','/api/admin/enrollments'],['users','/api/admin/users'],['messages','/api/admin/contact-messages'],['notices','/api/admin/notices'],['features','/api/admin/features'],['testimonials','/api/admin/testimonials'],['instructors','/api/admin/instructors'],['blog','/api/admin/blog'],['categories','/api/admin/categories'],['courseTabs','/api/admin/course-tabs'],['accessRequests','/api/admin/access-requests']];await Promise.all(jobs.map(async([k,p])=>{try{state[k]=await req(p)}catch(e){state[k]=Array.isArray(state[k])?[]:{}}}));for(const k in settingMap){try{state.settings[k]=await req(settingMap[k].path)}catch(e){state.settings[k]={}}}if(show)msg('ডেটা আপডেট হয়েছে');render()}catch(err){msg(err.message,'error')}}
function render(){setActive();const v=$('view');if(current==='dashboard')return renderDashboard(v);if(current==='homepage')return renderHomepage(v);if(current==='courses')return renderCourses(v);if(current==='enrollments')return renderEnrollments(v);if(current==='users')return renderUsers(v);if(current==='access')return renderAccess(v);if(current==='messages')return renderMessages(v);if(current==='settings')return renderSettings(v);if(current==='json')return renderJson(v);if(resourceMap[current])return renderResource(v,current)}
function panel(title,body,extra=''){return `<div class="panel"><div class="panel-head"><h3>${title}</h3>${extra}</div>${body}</div>`}
function row(title,meta,badge,actions=''){return `<div class="row"><div class="row-main"><b>${esc(title)}</b><p>${esc(meta)}</p></div><span class="badge ${esc(badge)}">${esc(badge)}</span><div class="actions">${actions}</div></div>`}
function renderDashboard(v){const s=state.stats||{},pending=(state.enrollments||[]).filter(x=>x.status==='pending').length;v.innerHTML=`<div class="grid stats"><div class="stat"><div class="icon">📚</div><p>কোর্স</p><h3>${s.courses??state.courses.length}</h3></div><div class="stat"><div class="icon">📋</div><p>এনরোলমেন্ট</p><h3>${s.enrollments??state.enrollments.length}</h3></div><div class="stat"><div class="icon">⏳</div><p>Pending</p><h3>${s.pendingEnrollments??pending}</h3></div><div class="stat"><div class="icon">💰</div><p>Revenue</p><h3>${money(s.revenue)}</h3></div></div><br><div class="grid two">${panel('দ্রুত কাজ',`<div class="grid three"><button class="btn secondary" onclick="go('courses')">নতুন কোর্স</button><button class="btn secondary" onclick="go('homepage')">হোমপেজ আপডেট</button><button class="btn secondary" onclick="go('enrollments')">Order দেখুন</button></div>`)}${panel('সাম্প্রতিক এনরোলমেন্ট',(state.enrollments||[]).slice(0,6).map(x=>row(x.studentName||'Student',x.courseTitle||'',x.status||'pending')).join('')||'<div class="empty">এখনো এনরোলমেন্ট নেই</div>')}</div>`}
function renderHomepage(v){const h=state.settings.hero||{},n=state.notices||[];v.innerHTML=`<div class="grid two">${panel('Hero Section',`<form onsubmit="saveSetting(event,'hero')"><div class="form-grid">${input('title','শিরোনাম',h.title)}${input('subtitle','সাবটাইটেল',h.subtitle,'textarea')}${input('buttonText','Button Text',h.buttonText)}${input('buttonLink','Button Link',h.buttonLink)}${input('image','Hero Image URL',h.image||h.backgroundImage,'text','full')}</div><br><button class="btn">Hero সংরক্ষণ</button></form>`)}${panel('Notice Bar',`<form onsubmit="saveNotice(event)"><div class="form-grid">${input('title','Notice Title','')}${input('body','বিস্তারিত','','textarea')}${input('ctaText','CTA Text','')}${input('ctaLink','CTA Link','')}</div><br><button class="btn">Notice যোগ করুন</button></form><hr style="border-color:var(--line);border-width:1px 0 0;margin:18px 0">${n.map(x=>row(x.title,x.body||'',x.active?'active':'draft',`<button class="btn danger small" onclick="del('/api/admin/notices/${x._id}')">Delete</button>`)).join('')||'<div class="empty">Notice নেই</div>'}`)}</div>`}
function input(name,label,value='',type='text',cls=''){if(type==='textarea')return `<label class="field ${cls}">${label}<textarea name="${name}">${esc(value)}</textarea></label>`;return `<label class="field ${cls}">${label}<input name="${name}" type="${type}" value="${esc(value)}"></label>`}
function formDataObj(form){return Object.fromEntries(new FormData(form).entries())}
async function saveSetting(e,key){e.preventDefault();try{let data=formDataObj(e.target);if(key==='hero'){data.backgroundImage=data.image||data.backgroundImage||''}await req(settingMap[key].path,{method:'POST',body:JSON.stringify(data)});state.settings[key]=data;msg('সংরক্ষণ হয়েছে। index.html এখন আপডেটেড ডেটা পাবে।')}catch(err){msg(err.message,'error')}}
async function saveNotice(e){e.preventDefault();try{await req('/api/admin/notices',{method:'POST',body:JSON.stringify({...formDataObj(e.target),active:true})});e.target.reset();await loadAll(false);msg('Notice সংরক্ষণ হয়েছে')}catch(err){msg(err.message,'error')}}
function renderCourses(v){const list=state.courses||[];v.innerHTML=`<div class="grid two">${panel(editId?'কোর্স এডিট':'নতুন কোর্স',courseForm(list.find(x=>x._id===editId)||{}))}${panel('সব কোর্স',`<div class="toolbar"><input id="courseSearch" class="search" placeholder="কোর্স খুঁজুন" oninput="filterCourses()"><button class="btn secondary small" onclick="editId=null;render()">New</button></div><div id="courseList">${courseRows(list)}</div>`)}</div>`}
function courseForm(c){return `<form onsubmit="saveCourse(event)"><div class="form-grid">${input('title','কোর্সের নাম',c.title||'')}${input('slug','Slug',c.slug||'')}${input('category','ক্যাটাগরি',c.category||'')}${input('instructor','Instructor',c.instructor||'')}${input('price','Price',c.price||0,'number')}${input('originalPrice','Old Price',c.originalPrice||0,'number')}${input('thumbnail','Thumbnail URL',c.thumbnail||'','text','full')}${input('shortDesc','Short Description',c.shortDesc||'','textarea','full')}</div><label class="field"><input type="checkbox" name="featured" ${c.featured?'checked':''}> Featured</label><label class="field"><input type="checkbox" name="published" ${c.published!==false?'checked':''}> Published</label><button class="btn">${editId?'Update':'Add'} Course</button></form>`}
function courseRows(list){return list.map(c=>row(c.title,`${c.category||'No category'} • ${money(c.price)}`,c.published===false?'draft':'live',`<button class="btn secondary small" onclick="editId='${c._id}';render()">Edit</button><button class="btn danger small" onclick="del('/api/admin/courses/${c._id}')">Delete</button>`)).join('')||'<div class="empty">কোর্স নেই</div>'}
function filterCourses(){const q=$('courseSearch').value.toLowerCase();$('courseList').innerHTML=courseRows((state.courses||[]).filter(c=>[c.title,c.category,c.instructor].some(x=>String(x||'').toLowerCase().includes(q))))}
async function saveCourse(e){e.preventDefault();try{const d=formDataObj(e.target);d.slug=d.slug||slug(d.title);d.price=Number(d.price||0);d.originalPrice=Number(d.originalPrice||0);d.featured=!!e.target.featured.checked;d.published=!!e.target.published.checked;await req(editId?'/api/admin/courses/'+editId:'/api/admin/courses',{method:editId?'PUT':'POST',body:JSON.stringify(d)});editId=null;await loadAll(false);msg('কোর্স সংরক্ষণ হয়েছে')}catch(err){msg(err.message,'error')}}
function renderEnrollments(v){v.innerHTML=panel('এনরোলমেন্ট / Orders',(state.enrollments||[]).map(x=>row(x.studentName||'Student',`${x.courseTitle||''} • ${x.studentPhone||x.studentEmail||''} • ${money(x.amount)}`,x.status||'pending',`<button class="btn green small" onclick="setEnroll('${x._id}','approved')">Approve</button><button class="btn secondary small" onclick="setEnroll('${x._id}','rejected')">Reject</button><button class="btn danger small" onclick="del('/api/admin/enrollments/${x._id}')">Delete</button>`)).join('')||'<div class="empty">Order নেই</div>')}
async function setEnroll(id,status){try{await req('/api/admin/enrollments/'+id,{method:'PUT',body:JSON.stringify({status})});await loadAll(false);msg('স্ট্যাটাস আপডেট হয়েছে')}catch(err){msg(err.message,'error')}}
function renderUsers(v){v.innerHTML=panel('ব্যবহারকারী',`<div class="grid three">${(state.users||[]).map(u=>`<div class="row"><div class="row-main"><b>${esc(u.name||'Student')}</b><p>${esc(u.email||'')} • Courses: ${(u.enrolledCourses||[]).length}</p></div></div>`).join('')||'<div class="empty">User নেই</div>'}</div>`)}
function renderAccess(v){v.innerHTML=panel('Access Requests',(state.accessRequests||[]).map(x=>row(x.name||x.studentName||'Request',`${x.email||''} • ${x.courseTitle||x.courseId||''}`,x.status||'pending',`<button class="btn green small" onclick="access('${x._id}','approved')">Approve</button><button class="btn secondary small" onclick="access('${x._id}','rejected')">Reject</button>`)).join('')||'<div class="empty">Access request নেই</div>')}
async function access(id,status){try{await req('/api/admin/access-requests/'+id,{method:'PUT',body:JSON.stringify({status})});await loadAll(false);msg('Access request আপডেট হয়েছে')}catch(err){msg(err.message,'error')}}
function renderMessages(v){v.innerHTML=panel('Contact Messages',(state.messages||[]).map(x=>row(x.subject||x.name||'Message',`${x.email||''} — ${x.message||''}`,'inbox',`<button class="btn danger small" onclick="del('/api/admin/contact-messages/${x._id}')">Delete</button>`)).join('')||'<div class="empty">মেসেজ নেই</div>')}
function renderResource(v,key){const cfg=resourceMap[key],list=state[key==='tabs'?'courseTabs':key]||[],item=list.find(x=>x._id===editId)||{};v.innerHTML=`<div class="grid two">${panel(editId?cfg.title+' এডিট':'নতুন '+cfg.title,resourceForm(cfg,item))}${panel(cfg.title+' তালিকা',list.map(x=>row(x.title||x.name||x.label||x.question||'Untitled',x.slug||x.key||x.desc||x.email||'',x.published===false||x.active===false?'draft':'active',`<button class="btn secondary small" onclick="editId='${x._id}';render()">Edit</button><button class="btn danger small" onclick="del('${cfg.path}/${x._id}')">Delete</button>`)).join('')||'<div class="empty">ডেটা নেই</div>')}</div>`}
function resourceForm(cfg,item){return `<form onsubmit="saveResource(event,'${current}')"><div class="form-grid">${cfg.fields.map(f=>input(f,f,item[f]??(f==='active'||f==='published'?true:''),typeof item[f]==='number'||f==='order'||f==='rating'?'number':(f==='bio'||f==='content'||f==='text'||f==='desc'||f==='excerpt'?'textarea':'text'),['bio','content','text','desc','excerpt'].includes(f)?'full':'' )).join('')}</div><button class="btn">সংরক্ষণ</button></form>`}
async function saveResource(e,key){e.preventDefault();try{const cfg=resourceMap[key],d=formDataObj(e.target);['active','published','featured'].forEach(k=>{if(cfg.fields.includes(k))d[k]=String(d[k]).toLowerCase()!=='false'});['order','rating'].forEach(k=>{if(k in d)d[k]=Number(d[k]||0)});await req(editId?cfg.path+'/'+editId:cfg.path,{method:editId?'PUT':'POST',body:JSON.stringify(d)});editId=null;await loadAll(false);msg('সংরক্ষণ হয়েছে')}catch(err){msg(err.message,'error')}}
function renderSettings(v){v.innerHTML=`<div class="tabs">${Object.keys(settingMap).map((k,i)=>`<button class="${i===0?'active':''}" onclick="openSetting('${k}',this)">${settingMap[k].label}</button>`).join('')}</div><div id="settingEditor"></div>`;openSetting('hero',document.querySelector('.tabs button'))}
function openSetting(key,btn){document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const data=state.settings[key]||{};$('settingEditor').innerHTML=panel(settingMap[key].label,`<form onsubmit="saveJsonSetting(event,'${key}')"><label class="field">JSON Data<textarea class="jsonbox" name="json">${esc(JSON.stringify(data,null,2))}</textarea></label><button class="btn">সংরক্ষণ</button></form>`)}
async function saveJsonSetting(e,key){e.preventDefault();try{const data=JSON.parse(new FormData(e.target).get('json'));await req(settingMap[key].path,{method:'POST',body:JSON.stringify(data)});state.settings[key]=data;msg('Settings সংরক্ষণ হয়েছে')}catch(err){msg(err.message,'error')}}
function renderJson(v){v.innerHTML=panel('Advanced Content Bundle / Cache Data',`<p style="color:var(--muted);margin-top:0">index.html-এ বারবার আলাদা আলাদা request কমাতে আপনার server.js-এর <b>/api/public-content-bundle</b> endpoint ব্যবহার করুন। Admin থেকে save করলে এই bundle আপডেট হবে।</p><form onsubmit="saveBundle(event)"><label class="field">Content Bundle JSON<textarea class="jsonbox" name="json">${esc(JSON.stringify(state.settings.bundle||{},null,2))}</textarea></label><button class="btn">Content Bundle Save</button></form>`)}
async function saveBundle(e){e.preventDefault();try{const data=JSON.parse(new FormData(e.target).get('json'));await req('/api/admin/content-bundle',{method:'POST',body:JSON.stringify(data)});state.settings.bundle=data;msg('Content bundle সংরক্ষণ হয়েছে।')}catch(err){msg(err.message,'error')}}
async function del(path){if(!confirm('আপনি কি নিশ্চিত?'))return;try{await req(path,{method:'DELETE'});await loadAll(false);msg('ডিলিট হয়েছে')}catch(err){msg(err.message,'error')}}
if(token){showApp();loadAll(true)}
</script>
</body>
</html>
